name: Refresh Personal Newspaper

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:       # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Generate newspaper + stock dashboard
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_newspaper.py

      - name: Commit updated newspaper
        run: |
          git config user.name "personal-newspaper-bot"
          git config user.email "bot@example.com"
          git add index.html
          git commit -m "Refresh newspaper + stocks $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push
